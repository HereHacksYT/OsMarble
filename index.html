<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kendi Kendine Yarışan Misketler & Harita Editörü</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
</head>
<body>

  <div id="ui">
    <h2>🔴 Misket Yarış Arenası</h2>
    
    <div class="section">
      <label>Harita Seç:</label>
      <button id="btn-map1">🏟️ Harita 1: Klasik Rampa</button>
      <button id="btn-map2">⚔️ Harita 2: Zikzak Parkur</button>
    </div>

    <div class="section">
      <button id="btn-spawn" class="action-btn">🎲 5 Misket Bırak!</button>
      <button id="btn-clear-marbles" class="danger-btn">🧹 Misketleri Temizle</button>
    </div>

    <hr>

    <div class="section">
      <h3>🛠️ Harita Tasarla (Editör)</h3>
      <button id="btn-toggle-edit" class="edit-btn">Mode: İzleyici (Editörü Aç)</button>
      <p class="small-text" id="edit-info" style="display:none;">Zemine sol tıklayarak yeni blok koyabilirsin!</p>
      <button id="btn-export" style="display:none;">💾 Haritayı İndir (JSON)</button>
    </div>
  </div>

  <script src="js/maps.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
